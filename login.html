<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Ennerdale Marketing</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      min-height: 100vh;
      background: #f5f7fb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: linear-gradient(135deg, #f5f7fb 0%, #e8f5e9 100%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      text-decoration: none;
      color: #111;
    }

    .brand-icon {
      width: 46px;
      height: 46px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
      box-shadow: 0 8px 20px rgba(37, 211, 102, 0.35);
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 420px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 28px;
    }

    /* Tab switcher */
    .auth-tabs {
      display: flex;
      background: #f5f7fb;
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .auth-tab.active {
      background: white;
      color: #111;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    /* Form fields */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 15px;
      transition: color 0.25s;
    }

    .field input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 1.5px solid rgba(0, 0, 0, 0.1);
      border-radius: 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: all 0.25s ease;
    }

    .field input:focus {
      border-color: #25D366;
      background: white;
      box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.1);
    }

    .field input:focus + i,
    .input-wrap:focus-within i { color: #25D366; }

    /* The icon is after the input in DOM but positioned absolutely */
    .input-wrap input:focus ~ i { color: #25D366; }

    /* Error message */
    .error-msg {
      display: none;
      background: #fff3f3;
      border: 1px solid rgba(255, 59, 48, 0.2);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #d32f2f;
      margin-bottom: 16px;
      align-items: flex-start;
      gap: 8px;
    }

    .error-msg.visible {
      display: flex;
    }

    .error-msg i {
      margin-top: 1px;
      flex-shrink: 0;
    }

    /* Success message */
    .success-msg {
      display: none;
      background: #f0fdf4;
      border: 1px solid rgba(37, 211, 102, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #15803d;
      margin-bottom: 16px;
      align-items: flex-start;
      gap: 8px;
    }

    .success-msg.visible {
      display: flex;
    }

    /* Submit button */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(37, 211, 102, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #1ebe5d;
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(37, 211, 102, 0.45);
    }

    .btn-primary:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-primary.loading .spinner { display: block; }
    .btn-primary.loading .btn-text { display: none; }
    .btn-primary.loading .btn-icon { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: #25D366; }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; border-radius: 20px; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="brand">
    <div class="brand-icon"><i class="fa-solid fa-store"></i></div>
    <span class="brand-name">Ennerdale Marketing</span>
  </a>

  <div class="card">
    <h1 class="card-title">Welcome back</h1>
    <p class="card-subtitle">Sign in to list products in your community.</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin">Log In</button>
      <button class="auth-tab" id="tabSignUp">Create Account</button>
    </div>

    <div id="errorBox" class="error-msg">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="errorText">Something went wrong.</span>
    </div>

    <div id="successBox" class="success-msg">
      <i class="fa-solid fa-circle-check"></i>
      <span id="successText">Done!</span>
    </div>

    <div class="field">
      <label for="authEmail">Email Address</label>
      <div class="input-wrap">
        <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
        <i class="fa-solid fa-envelope"></i>
      </div>
    </div>

    <div class="field">
      <label for="authPassword">Password</label>
      <div class="input-wrap">
        <input type="password" id="authPassword" placeholder="Minimum 6 characters" autocomplete="current-password">
        <i class="fa-solid fa-lock"></i>
      </div>
    </div>

    <button class="btn-primary" id="authBtn">
      <div class="spinner"></div>
      <i class="fa-solid fa-right-to-bracket btn-icon"></i>
      <span class="btn-text">Log In</span>
    </button>

    <a href="index.html" class="back-link">
      <i class="fa-solid fa-arrow-left"></i> Back to Marketplace
    </a>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://lvdvjymuvcpvkbdgikkc.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2ZHZqeW11dmNwdmtiZGdpa2tjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTI5MjMsImV4cCI6MjA5Nzc2ODkyM30.SChOKdMbWIP27_n-diBDioXKQh2whtdCbbS_fHmW2_U'
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    // ── DOM refs ──
    const tabLogin   = document.getElementById('tabLogin')
    const tabSignUp  = document.getElementById('tabSignUp')
    const authBtn    = document.getElementById('authBtn')
    const emailInput = document.getElementById('authEmail')
    const pwInput    = document.getElementById('authPassword')
    const errorBox   = document.getElementById('errorBox')
    const errorText  = document.getElementById('errorText')
    const successBox = document.getElementById('successBox')
    const successText = document.getElementById('successText')

    let mode = 'login' // 'login' | 'signup'

    // ── If already logged in, redirect immediately ──
    const { data: { session } } = await supabase.auth.getSession()
    if (session) window.location.href = 'upload.html'

    // ── Tab switching ──
    tabLogin.addEventListener('click', () => {
      mode = 'login'
      tabLogin.classList.add('active')
      tabSignUp.classList.remove('active')
      authBtn.querySelector('.btn-text').textContent = 'Log In'
      authBtn.querySelector('.btn-icon').className = 'fa-solid fa-right-to-bracket btn-icon'
      document.querySelector('.card-title').textContent = 'Welcome back'
      document.querySelector('.card-subtitle').textContent = 'Sign in to list products in your community.'
      hideMessages()
    })

    tabSignUp.addEventListener('click', () => {
      mode = 'signup'
      tabSignUp.classList.add('active')
      tabLogin.classList.remove('active')
      authBtn.querySelector('.btn-text').textContent = 'Create Account'
      authBtn.querySelector('.btn-icon').className = 'fa-solid fa-user-plus btn-icon'
      document.querySelector('.card-title').textContent = 'Join the marketplace'
      document.querySelector('.card-subtitle').textContent = 'Create a free seller account in seconds.'
      hideMessages()
    })

    // ── Helpers ──
    function setLoading(loading) {
      authBtn.disabled = loading
      authBtn.classList.toggle('loading', loading)
    }

    function showError(msg) {
      errorText.textContent = msg
      errorBox.classList.add('visible')
      successBox.classList.remove('visible')
    }

    function showSuccess(msg) {
      successText.textContent = msg
      successBox.classList.add('visible')
      errorBox.classList.remove('visible')
    }

    function hideMessages() {
      errorBox.classList.remove('visible')
      successBox.classList.remove('visible')
    }

    function validate() {
      const email = emailInput.value.trim()
      const pw    = pwInput.value.trim()
      if (!email || !email.includes('@')) {
        showError('Please enter a valid email address.')
        return false
      }
      if (pw.length < 6) {
        showError('Password must be at least 6 characters.')
        return false
      }
      return true
    }

    // ── Auth handler ──
    authBtn.addEventListener('click', async () => {
      hideMessages()
      if (!validate()) return
      setLoading(true)

      const email = emailInput.value.trim()
      const pw    = pwInput.value.trim()

      try {
        if (mode === 'login') {
          const { error } = await supabase.auth.signInWithPassword({ email, password: pw })
          if (error) throw error
          window.location.href = 'upload.html'

        } else {
          const { error } = await supabase.auth.signUp({ email, password: pw })
          if (error) throw error
          showSuccess('Account created! Check your email inbox for a verification link before logging in.')
          pwInput.value = ''
        }
      } catch (err) {
        const knownErrors = {
          'Invalid login credentials': 'Incorrect email or password. Please try again.',
          'Email not confirmed': 'Please verify your email before logging in. Check your inbox.',
          'User already registered': 'An account with this email already exists. Try logging in.',
        }
        showError(knownErrors[err.message] || err.message)
      } finally {
        setLoading(false)
      }
    })

    // Allow Enter key to submit
    [emailInput, pwInput].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') authBtn.click() })
    })
  </script>

</body>
</html>
